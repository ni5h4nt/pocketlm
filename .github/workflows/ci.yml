name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy pocketlm
      - run: pytest -q
  notebooks:
    runs-on: ubuntu-latest
    env: { POCKETLM_CI: '1' }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - run: pip install -e ".[dev]"
      - run: nbqa ruff lessons/
      - run: pytest --nbmake --nbmake-timeout=300 lessons/ -q
